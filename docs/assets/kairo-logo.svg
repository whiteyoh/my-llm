<svg xmlns="http://www.w3.org/2000/svg" width="960" height="260" viewBox="0 0 960 260" role="img" aria-labelledby="title desc">
  <title id="title">Kairo logo</title>
  <desc id="desc">Kairo educational AI lab logo with connected token nodes and wordmark.</desc>
  <defs>
    <linearGradient id="g" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#7C3AED"/>
      <stop offset="50%" stop-color="#06B6D4"/>
      <stop offset="100%" stop-color="#22C55E"/>
    </linearGradient>
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <rect width="960" height="260" rx="34" fill="#0B1020"/>
  <circle cx="115" cy="130" r="74" fill="none" stroke="url(#g)" stroke-width="10" filter="url(#glow)"/>
  <path d="M80 155 L115 83 L150 155" fill="none" stroke="#E0F2FE" stroke-width="12" stroke-linecap="round" stroke-linejoin="round"/>
  <path d="M96 128 H134" stroke="#22D3EE" stroke-width="10" stroke-linecap="round"/>
  <circle cx="228" cy="86" r="14" fill="#7C3AED"/>
  <circle cx="276" cy="130" r="14" fill="#06B6D4"/>
  <circle cx="228" cy="174" r="14" fill="#22C55E"/>
  <path d="M242 92 L262 119 M262 141 L242 168" stroke="#94A3B8" stroke-width="5" stroke-linecap="round"/>
  <text x="330" y="120" fill="#F8FAFC" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="76" font-weight="800" letter-spacing="1">Kairo</text>
  <text x="334" y="162" fill="#A5F3FC" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="25" font-weight="600">Build it · Train it · Talk to it · Retrain it · Understand it</text>
  <text x="336" y="198" fill="#CBD5E1" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="20">A hands-on educational GPT lab for demystifying language models</text>
</svg>
