name: Quality

on:
  pull_request:
  push:
    branches: [main]

jobs:
  quality:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install package and test tools
        run: |
          python -m pip install --upgrade pip
          pip install -e .
          pip install pytest ruff

      - name: Ruff lint
        run: ruff check .

      - name: Compile Python files
        run: python -m compileall src tests

      - name: Unit tests
        run: pytest -q

      - name: Smoke train
        run: |
          python src/train.py \
            --input_file data/sample.txt \
            --out_dir runs/ci \
            --epochs 1 \
            --batch_size 4 \
            --seq_len 32 \
            --d_model 64 \
            --n_heads 4 \
            --n_layers 2

      - name: Smoke generate
        run: |
          python src/generate.py \
            --checkpoint runs/ci/best.pt \
            --prompt "Once upon a time" \
            --max_new_tokens 10

      - name: Smoke evaluate
        run: |
          python src/evaluate.py \
            --checkpoint runs/ci/best.pt \
            --input_file data/sample.txt \
            --batch_size 4
